apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: micro-demo
  labels:
    app.kubernetes.io/name: inventory-service
    app.kubernetes.io/part-of: micro-demo
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: inventory-service
  ports:
    # Port 80 allows http://inventory-service from order-service.
    - name: http
      port: 80
      targetPort: 3001
    # Port 3001 keeps direct scrape target for Prometheus.
    - name: metrics
      port: 3001
      targetPort: 3001
