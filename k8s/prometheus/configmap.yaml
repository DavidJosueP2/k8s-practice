apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: micro-demo
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: micro-demo
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
      evaluation_interval: 5s

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ['localhost:9090']

      - job_name: inventory-service
        metrics_path: /metrics
        static_configs:
          - targets: ['inventory-service.micro-demo.svc.cluster.local:3001']

      - job_name: order-service
        metrics_path: /metrics
        static_configs:
          - targets: ['order-service.micro-demo.svc.cluster.local:3000']
