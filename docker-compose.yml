name: k8s-practice

services:
  redis:
    image: redis:7-alpine
    container_name: redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  inventory-service:
    build:
      context: ./inventory-service
      dockerfile: Dockerfile
    image: k8s-practice/inventory-service:latest
    container_name: inventory-service
    environment:
      NODE_ENV: production
      PORT: "3001"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    ports:
      - "3001:3001"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    image: k8s-practice/order-service:latest
    container_name: order-service
    environment:
      NODE_ENV: production
      PORT: "3002"
      INVENTORY_SERVICE_URL: http://inventory-service:3001
    ports:
      - "3002:3002"
    depends_on:
      inventory-service:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
