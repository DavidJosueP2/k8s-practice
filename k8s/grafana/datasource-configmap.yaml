apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource
  namespace: micro-demo
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: micro-demo
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: false
